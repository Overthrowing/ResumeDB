[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "/backend/**",
  "/deploy/**",
  "/Dockerfile",
  "/pyproject.toml",
  "/uv.lock",
  "/railway.toml",
]

[deploy]
startCommand = "./deploy/start-backend.sh"
numReplicas = 1
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
requiredMountPath = "/data"
