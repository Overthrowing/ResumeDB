    const atsStatusReady = q(".f08-extension-autofill-ats-status-ready");

    const tl = gsap.timeline({ paused: true });

    tl.set(header, { opacity: 0, y: 18 }, 0);
    tl.set(extension, { opacity: 0, x: -24 }, 0);
    tl.set(ats, { opacity: 0, x: 24 }, 0);

    tl.set(extensionStatusPreflight, { opacity: 1 }, 0);
    tl.set([extensionStatusFilling, extensionStatusComplete], { opacity: 0 }, 0);
    tl.set(actionStart, { opacity: 1 }, 0);
    tl.set([actionFilling, actionComplete], { opacity: 0 }, 0);
    tl.set(ripple, { opacity: 0, scale: 0.4 }, 0);
    tl.set(cursor, { opacity: 0, x: 0, y: 0, scale: 1 }, 0);
    tl.set(values, { opacity: 0, x: 7, clipPath: "inset(0 100% 0 0)" }, 0);
    tl.set(controls, { borderColor: "rgba(32,31,29,0.17)", boxShadow: "none" }, 0);
    tl.set(resumeField, { opacity: 1 }, 0);
    tl.set(resumeControl, { borderColor: "rgba(32,31,29,0.17)", boxShadow: "none" }, 0);
    tl.set([uploadCopy, fileIcon, uploadProgress], { opacity: 0 }, 0);
    tl.set(uploadCheck, { opacity: 0, scale: 0.55 }, 0);
    tl.set(uploadProgressFill, { scaleX: 0 }, 0);
    tl.set(completeZero, { opacity: 1 }, 0);
    tl.set(completeSeven, { opacity: 0 }, 0);
    tl.set(atsStatusPreflight, { opacity: 1 }, 0);
    tl.set([atsStatusRunning, atsStatusReady], { opacity: 0 }, 0);

    tl.to(extension, { opacity: 1, x: 0, duration: 0.64, ease: "power3.out" }, 0.12);
    tl.to(ats, { opacity: 1, x: 0, duration: 0.64, ease: "power3.out" }, 0.2);
    tl.to(mapRows, { opacity: 1, x: 0, duration: 0.27, stagger: 0.105, ease: "power2.out" }, 0.42);

    tl.to(cursor, { opacity: 1, duration: 0.18, ease: "none" }, 1.24);
    tl.to(cursor, { x: 165, y: 118, duration: 0.38, ease: "power2.inOut" }, 1.32);
    tl.to(cursor, { scale: 0.86, duration: 0.08, ease: "power1.in" }, 1.72);
