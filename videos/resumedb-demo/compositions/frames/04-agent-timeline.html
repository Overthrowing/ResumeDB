    const f04AgentRoot = document.querySelector('[data-composition-id="04-agent-timeline"]');

    const f04RailStates = Array.from(f04AgentRoot.querySelectorAll('.f04-agent-timeline-rail-step-state'));

    const f04EvidenceRows = Array.from(f04AgentRoot.querySelectorAll('.f04-agent-timeline-evidence-row'));

    const f04RowChecks = Array.from(f04AgentRoot.querySelectorAll('.f04-agent-timeline-row-check'));

    f04LinkPaths.forEach((path) => {
      const pathLength = path.getTotalLength();
      gsap.set(path, { strokeDasharray: pathLength, strokeDashoffset: pathLength });
    });

    const f04SetRail = (index, status, at) => {
      f04AgentTimeline.to(
        '#f04-agent-timeline-rail-focus',
        { y: index * 83, duration: 0.42, ease: 'power3.inOut' },
        at
      );
      f04AgentTimeline.to(
        '#f04-agent-timeline-rail-fill',
        { scaleY: (index + 1) / 4, duration: 0.42, ease: 'power3.out', transformOrigin: '50% 0%' },
        at
      );
      f04AgentTimeline.set(f04RailStates[index], { textContent: 'Active', color: '#6d28d9' }, at);
      f04AgentTimeline.set('#f04-agent-timeline-run-status', { textContent: status }, at);

      if (index > 0) {
        f04AgentTimeline.set(f04RailStates[index - 1], { textContent: 'Complete', color: '#615d59' }, at);
        f04AgentTimeline.set(
          f04RailIndexes[index - 1],
          { textContent: '✓', backgroundColor: '#6d28d9', color: '#ffffff', borderColor: '#6d28d9' },
          at
        );
      }
    };

    f04AgentTimeline.fromTo(
      '#f04-agent-timeline-heading',
      { y: -16, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.46, ease: 'power2.out' },
      0
    );
    f04AgentTimeline.fromTo(
      '#f04-agent-timeline-agent-shell',
      { y: 18, scale: 0.975, opacity: 0 },
      { y: 0, scale: 1, opacity: 1, duration: 0.72, ease: 'power3.out' },
      0.08
    );
    f04AgentTimeline.fromTo(
      '#f04-agent-timeline-rail',
      { x: 24, opacity: 0 },
      { x: 0, opacity: 1, duration: 0.62, ease: 'power3.out' },
      0.22
    );
    f04AgentTimeline.fromTo(
      '#f04-agent-timeline-rail-fill',
      { scaleY: 0 },
      { scaleY: 0.25, duration: 0.52, ease: 'power3.out', transformOrigin: '50% 0%' },
      0.42
    );

    const f04EventTimes = [1.2, 2.05, 2.9, 3.75];
    const f04EventStatuses = ['Searching roles', 'Inspecting pages', 'Extracting requirements', 'Verifying evidence'];

    f04Events.forEach((event, index) => {
      const eventAt = f04EventTimes[index];
      f04AgentTimeline.set(event, { y: 34, opacity: 1 }, eventAt);
      f04AgentTimeline.to(event, { y: 0, duration: 0.2, ease: 'power4.out' }, eventAt);
      f04SetRail(index, f04EventStatuses[index], eventAt);
    });

    f04AgentTimeline.fromTo(
      '#f04-agent-timeline-scan',
      { y: 0, opacity: 0 },
      { y: 392, opacity: 1, duration: 2.18, ease: 'power1.inOut', immediateRender: false },
      4.2

    f04AgentTimeline.to(
      '#f04-agent-timeline-scan',
      { opacity: 0, duration: 0.18, ease: 'none' },
      6.39
    );

    const f04VerifyTimes = [4.58, 5.32, 6.05];
    f04EvidenceRows.forEach((row, index) => {
      const verifyAt = f04VerifyTimes[index];
      f04AgentTimeline.to(row, { opacity: 1, duration: 0.28, ease: 'power2.out' }, verifyAt);
      f04AgentTimeline.to(
        f04LinkPaths[index],
        { strokeDashoffset: 0, duration: 0.42, ease: 'power2.out' },
        verifyAt
      );
      f04AgentTimeline.set(f04RowChecks[index], { scale: 0.58, opacity: 1 }, verifyAt + 0.24);
      f04AgentTimeline.to(
        f04RowChecks[index],
        { scale: 1, duration: 0.32, ease: 'power3.out' },
        verifyAt + 0.24
      );
    });

    f04AgentTimeline.set(f04RailStates[3], { textContent: 'Complete', color: '#615d59' }, 6.42);
    f04AgentTimeline.set(
      f04RailIndexes[3],
      { textContent: '✓', backgroundColor: '#6d28d9', color: '#ffffff', borderColor: '#6d28d9' },
      6.42
    );

      '#f04-agent-timeline-result-robotics',
      { y: 18, scale: 0.94, opacity: 0 },
      { y: 0, scale: 1, opacity: 1, duration: 0.52, ease: 'power3.out', immediateRender: false },

    f04AgentTimeline.fromTo(
      '#f04-agent-timeline-result-bio',
      { y: 18, scale: 0.94, opacity: 0 },
      { y: 0, scale: 1, opacity: 1, duration: 0.52, ease: 'power3.out', immediateRender: false },

      { y: 0, opacity: 1, duration: 0.42, ease: 'power3.out', immediateRender: false },
